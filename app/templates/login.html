{% extends "base.html" %}

{% block title %}Ingresar{% endblock %}

{% block content %}
<section class="mx-auto max-w-md">
  <h1 class="mb-6 text-2xl font-bold text-slate-900">Ingresar</h1>

  <form method="post" class="space-y-4 rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

    <label class="block">
      <span class="mb-1 block text-sm font-semibold text-slate-700">Usuario</span>
      <input
        name="username"
        required
        autocomplete="username"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-brand-600 focus:ring-2 focus:ring-brand-100"
      >
    </label>

    <label class="block">
      <span class="mb-1 block text-sm font-semibold text-slate-700">Clave</span>
      <input
        type="password"
        name="password"
        required
        autocomplete="current-password"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-brand-600 focus:ring-2 focus:ring-brand-100"
      >
    </label>

    <button class="w-full rounded-lg bg-brand-700 px-4 py-2.5 text-sm font-semibold text-white hover:bg-brand-800">
      Entrar
    </button>
  </form>
</section>
{% endblock %}
